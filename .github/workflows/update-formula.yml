name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          URL="${{ github.event.client_payload.url }}"
          SHA256="${{ github.event.client_payload.sha256 }}"

          echo "Updating to version ${VERSION}"
          echo "  URL: ${URL}"
          echo "  SHA256: ${SHA256}"

          # Update url line
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/rapid-mlx.rb
          # Update sha256 line
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/rapid-mlx.rb
          # Update version in install line
          sed -i "s|rapid-mlx==.*\"|rapid-mlx==${VERSION}\"|" Formula/rapid-mlx.rb

      - name: Commit and push
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rapid-mlx.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "rapid-mlx ${VERSION}"
          git push
